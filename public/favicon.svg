<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Terminal window frame -->
  <rect x="2" y="4" width="28" height="24" rx="4" fill="#161b27" stroke="#2a3347" stroke-width="1.5"/>
  <!-- Title bar -->
  <rect x="2" y="4" width="28" height="8" rx="4" fill="#1e2535"/>
  <rect x="2" y="8" width="28" height="4" fill="#1e2535"/>
  <!-- Traffic lights -->
  <circle cx="8" cy="8" r="1.5" fill="#ef4444" opacity="0.8"/>
  <circle cx="13" cy="8" r="1.5" fill="#f59e0b" opacity="0.8"/>
  <circle cx="18" cy="8" r="1.5" fill="#10b981" opacity="0.8"/>
  <!-- Prompt symbol -->
  <text x="5" y="22" font-family="monospace" font-size="9" font-weight="bold" fill="#6366f1">&gt;_</text>
  <!-- Cursor blink line -->
  <rect x="17" y="18.5" width="5" height="2" rx="1" fill="#6366f1" opacity="0.9"/>
</svg>
